<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Crown -->
  <rect x="92" y="40" width="8" height="20" rx="2" fill="black" />
  
  <!-- Case/Dial -->
  <circle cx="48" cy="50" r="44" fill="white" stroke="black" stroke-width="8" />
  
  <!-- Indices -->
  <line x1="48" y1="18" x2="48" y2="28" stroke="black" stroke-width="6" stroke-linecap="round" />
  <line x1="78" y1="50" x2="68" y2="50" stroke="black" stroke-width="6" stroke-linecap="round" />
  <line x1="48" y1="82" x2="48" y2="72" stroke="black" stroke-width="6" stroke-linecap="round" />
  <line x1="18" y1="50" x2="28" y2="50" stroke="black" stroke-width="6" stroke-linecap="round" />
  
  <!-- Hands -->
  <!-- Hour Hand -->
  <line x1="48" y1="50" x2="32" y2="34" stroke="black" stroke-width="6" stroke-linecap="round" />
  <!-- Minute Hand -->
  <line x1="48" y1="50" x2="64" y2="20" stroke="black" stroke-width="6" stroke-linecap="round" />
  
  <!-- Center Pin -->
  <circle cx="48" cy="50" r="5" fill="black" />
</svg>
