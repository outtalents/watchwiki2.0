<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" stroke="#15517a">
  <!-- Strap Top -->
  <path d="M 44 26 L 46 4 L 74 4 L 76 26" stroke-width="3" stroke-linejoin="round" fill="#15517a" fill-opacity="0.05" />
  <line x1="48" y1="12" x2="72" y2="12" stroke-width="1.5" opacity="0.3" />
  <line x1="47" y1="20" x2="73" y2="20" stroke-width="1.5" opacity="0.3" />
  
  <!-- Strap Bottom -->
  <path d="M 44 94 L 46 116 L 74 116 L 76 94" stroke-width="3" stroke-linejoin="round" fill="#15517a" fill-opacity="0.05" />
  <line x1="48" y1="108" x2="72" y2="108" stroke-width="1.5" opacity="0.3" />
  <line x1="47" y1="100" x2="73" y2="100" stroke-width="1.5" opacity="0.3" />
  
  <!-- Lugs -->
  <path d="M 35 38 L 32 22 L 44 26" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 85 38 L 88 22 L 76 26" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 35 82 L 32 98 L 44 94" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 85 82 L 88 98 L 76 94" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Crown & Pushers (Chronograph style) -->
  <rect x="94" y="54" width="5" height="12" rx="1.5" stroke-width="2.5" fill="#15517a" />
  <path d="M 86 41 L 96 34 L 99 39 L 89 46 Z" stroke-width="2" fill="#15517a" />
  <path d="M 86 79 L 96 86 L 99 81 L 89 74 Z" stroke-width="2" fill="#15517a" />

  <!-- Case -->
  <circle cx="60" cy="60" r="36" stroke-width="4" fill="white" />
  
  <!-- Bezel inner ring -->
  <circle cx="60" cy="60" r="31" stroke-width="1" opacity="0.3" />
  
  <!-- Tachymeter / Outer Bezel Marks -->
  <circle cx="60" cy="60" r="33.5" stroke-width="3" stroke-dasharray="1 4" opacity="0.4" />
  
  <!-- Sub-dials (Chronograph) -->
  <circle cx="46" cy="60" r="7" stroke-width="1.5" opacity="0.6" />
  <circle cx="74" cy="60" r="7" stroke-width="1.5" opacity="0.6" />
  <circle cx="60" cy="74" r="7" stroke-width="1.5" opacity="0.6" />
  
  <!-- Sub-dial hands -->
  <line x1="46" y1="60" x2="46" y2="55" stroke-width="1.5" stroke-linecap="round" />
  <line x1="74" y1="60" x2="78" y2="60" stroke-width="1.5" stroke-linecap="round" />
  <line x1="60" y1="74" x2="56" y2="74" stroke-width="1.5" stroke-linecap="round" />

  <!-- Main Dial Indices -->
  <line x1="60" y1="32" x2="60" y2="36" stroke-width="2.5" stroke-linecap="round" />
  <line x1="60" y1="84" x2="60" y2="88" stroke-width="2.5" stroke-linecap="round" />
  <line x1="32" y1="60" x2="36" y2="60" stroke-width="2.5" stroke-linecap="round" />
  <line x1="84" y1="60" x2="88" y2="60" stroke-width="2.5" stroke-linecap="round" />
  
  <line x1="40" y1="40" x2="43" y2="43" stroke-width="2" stroke-linecap="round" />
  <line x1="80" y1="40" x2="77" y2="43" stroke-width="2" stroke-linecap="round" />
  <line x1="40" y1="80" x2="43" y2="77" stroke-width="2" stroke-linecap="round" />
  <line x1="80" y1="80" x2="77" y2="77" stroke-width="2" stroke-linecap="round" />

  <!-- Main Hands -->
  <!-- Hour Hand -->
  <path d="M 60 60 L 56 46 L 60 40 L 64 46 Z" fill="#15517a" stroke="none" />
  <!-- Minute Hand -->
  <g transform="rotate(45 60 60)">
    <path d="M 60 60 L 57 36 L 60 28 L 63 36 Z" fill="#15517a" stroke="none" />
  </g>
  <!-- Chronograph Seconds Hand -->
  <line x1="60" y1="68" x2="60" y2="28" stroke-width="1.5" stroke-linecap="round" />
  <circle cx="60" cy="38" r="1.5" fill="white" stroke="#15517a" stroke-width="1" />

  <!-- Center Pin -->
  <circle cx="60" cy="60" r="2" fill="white" stroke-width="1.5" />
</svg>
